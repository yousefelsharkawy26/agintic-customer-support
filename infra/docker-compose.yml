services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: cs_dev_password
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cs_user -d customer_support']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:6333/healthz']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: cs_minio
      MINIO_ROOT_PASSWORD: cs_minio_secret
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:3
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://cs_user:cs_dev_password@postgres:5432/customer_support
      NEXTAUTH_SECRET: langfuse-dev-secret-change-in-production
      SALT: langfuse-dev-salt-change-in-production
      TELEMETRY_ENABLED: 'false'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  miniodata:

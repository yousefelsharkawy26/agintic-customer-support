apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: customer-support
data:
  APP_NAME: 'Customer Support API'
  DEBUG: 'false'
  JWT_ALGORITHM: 'HS256'
  JWT_EXPIRE_MINUTES: '1440'
  LOG_LEVEL: 'INFO'
  DATABASE_URL: '{{env.DATABASE_URL}}'
  REDIS_URL: '{{env.REDIS_URL}}'
  QDRANT_URL: '{{env.QDRANT_URL}}'

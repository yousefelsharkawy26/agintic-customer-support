apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: customer-support
data:
  APP_NAME: 'Customer Support API'
  DEBUG: 'false'
  JWT_ALGORITHM: 'HS256'
  JWT_EXPIRE_MINUTES: '1440'
  LOG_LEVEL: 'INFO'
  DATABASE_URL: 'postgresql+asyncpg://cs_user:cs_dev_password@postgres:5432/customer_support'
  REDIS_URL: 'redis://redis:6379/0'
  QDRANT_URL: 'http://qdrant:6333'

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  PYTHON_VERSION: '3.13'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: customer_support
          POSTGRES_USER: cs_user
          POSTGRES_PASSWORD: cs_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U cs_user -d customer_support
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy . --exclude .venv

      - name: Test (pytest)
        run: uv run python -m pytest -q --timeout=30 -x
        env:
          DATABASE_URL: postgresql+asyncpg://cs_user:cs_dev_password@postgres:5432/customer_support
          REDIS_URL: redis://localhost:6379/0

      - name: Eval CI (if baseline exists)
        run: |
          if [ -f data/eval_baseline.json ]; then
            uv run python -m apps.api.eval.ci_runner
          else
            echo "No eval baseline found — skipping eval CI"
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Start app for k6 smoke test
        run: |
          uv run uvicorn apps.api.main:app --host 0.0.0.0 --port 8080 &
          sleep 3
          curl -sf http://localhost:8080/health || (echo "App failed to start" && exit 1)

      - name: k6 smoke test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/load/smoke.js
          flags: --env AUTH_TOKEN=test-token

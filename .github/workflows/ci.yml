name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: uv sync --group dev
      - run: uv run ruff check apps/
      - run: uv run ruff format --check apps/
      - run: uv run mypy apps/

  lint-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g pnpm@9
      - run: pnpm install
      - run: pnpm lint
        continue-on-error: true
      - run: pnpm typecheck
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: uv sync --group dev
      - run: uv run pytest -x --cov=apps/api --cov-report=term-missing

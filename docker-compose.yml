x-app-defaults: &app
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - path: .env
      required: false
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - app-net

services:
  app:
    <<: *app
    deploy:
      replicas: 2
    ports:
      - '8080:8080'
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import httpx; httpx.get('http://localhost:8080/health', timeout=5)",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cs_dev_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cs_user -d customer_support']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - app-net

  qdrant:
    image: qdrant/qdrant:v1.13
    volumes:
      - qdrantdata:/qdrant/storage
    ports:
      - '6333:6333'
    restart: unless-stopped
    networks:
      - app-net

volumes:
  pgdata:
  redisdata:
  qdrantdata:

networks:
  app-net:
